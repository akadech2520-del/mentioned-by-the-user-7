function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return structuredClone(defaultState);
  try {
    const parsed = JSON.parse(saved);
    return { ...structuredClone(defaultState), ...parsed };
  } catch {
    return structuredClone(defaultState);
  }
}

function migrateState(data) {
  data.personnel = data.personnel || [];
  data.users = data.users || [];
  data.personnel.forEach((person) => {
    person.birthDate = normalizeStoredDate(person.birthDate);
    if (person.nationalId === "1479912341234") person.birthDate = "1977-11-07";
    person.positionNumber = person.positionNumber || "-";
    person.directPaymentNumber = person.directPaymentNumber || "-";
  });
  (data.requests || []).forEach((request) => {
    if (["รับด้วยตนเอง", "รับทางอีเมล", "ดาวน์โหลดผ่านระบบ"].includes(request.deliveryMethod)) {
      request.deliveryMethod = "รับเอง";
    }
    request.googleSyncStatus = request.googleSyncStatus || "รอส่งข้อมูล";
    request.googleSyncAt = request.googleSyncAt || "";
    request.googleSheetId = request.googleSheetId || GOOGLE_CONFIG.sheetId;
    request.googleDriveFolderId = request.googleDriveFolderId || GOOGLE_CONFIG.driveFolderId;
  });
  const applicantUser = data.users.find((item) => item.role === "applicant" && item.personId === "p1");
  if (applicantUser) {
    applicantUser.username = "1479912341234";
    applicantUser.password = "07/11/2520";
  }
  return data;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function isApplicantLogin(user, username, password) {
  const person = getPerson(user.personId);
  if (!person) return false;
  return person.nationalId === username && normalizePasswordDate(password) === formatBirthPassword(person.birthDate);
}

function wireLogin() {
  const roleButtons = document.querySelectorAll("[data-login-role]");
  roleButtons.forEach((button) => {
    button.addEventListener("click", () => {
      roleButtons.forEach((item) => item.classList.remove("active"));
      button.classList.add("active");
      session.role = button.dataset.loginRole;
      fillDemoCredentials(session.role);
    });
  });
  fillDemoCredentials(session.role);

  document.querySelector("#loginForm").addEventListener("submit", (event) => {
    event.preventDefault();
    const username = document.querySelector("#username").value.trim();
    const password = document.querySelector("#password").value.trim();
    const user = state.users.find((item) => {
      if (item.role !== session.role) return false;
      if (item.role === "applicant") return isApplicantLogin(item, username, password);
      return item.username === username && item.password === password;
    });
    if (!user) {
      showLoginMessage("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง กรุณาตรวจสอบอีกครั้ง", "danger");
      return;
    }
    session.user = user;
    session.view = "home";
    logAction("login", `เข้าสู่ระบบในสิทธิ์${roleMeta[user.role].label}`);
    openApp();
  });
}

function fillDemoCredentials(role) {
  const user = demoUsers.find((item) => item.role === role);
  document.querySelector("#username").value = user.username;
  document.querySelector("#password").value = user.password;
}

function showLoginMessage(message, type) {
  const existing = document.querySelector(".login-error");
  if (existing) existing.remove();
  const node = document.createElement("div");
  node.className = `notice ${type} login-error`;
  node.textContent = message;
  document.querySelector(".login-form").appendChild(node);
}

function wireGlobalActions() {
  document.querySelector("#logoutButton").addEventListener("click", () => {
    logAction("logout", "ออกจากระบบ");

    appShell.classList.add("hidden");
    loginScreen.classList.remove("hidden");
  });

  document.querySelector("#mobileMenuButton").addEventListener("click", () => {
    sidebar.classList.toggle("open");
  });

  content.addEventListener("click", handleContentClick);
  content.addEventListener("change", handleContentChange);
  content.addEventListener("input", handleContentInput);
}

function openApp() {
  loginScreen.classList.add("hidden");

  sidebar.classList.remove("open");
  renderShell();
  renderView();
  showNotice("ยินดีต้อนรับเข้าสู่ระบบขอ ก.พ.7 / ก.ค.ศ.16 Online", "success");
}

function renderShell() {
  const meta = roleMeta[session.user.role];
  roleLabel.textContent = meta.label;

  mainNav.innerHTML = meta.nav.map(([view, label]) => `
    <button class="nav-button ${session.view === view ? "active" : ""}" type="button" data-nav="${view}">
      ${label}
    </button>
  `).join("");
  mainNav.querySelectorAll("[data-nav]").forEach((button) => {
    button.addEventListener("click", () => {
      session.view = button.dataset.nav;
      sidebar.classList.remove("open");
      renderShell();
      renderView();
    });
  });
}

function renderView() {
  const meta = roleMeta[session.user.role];
  pageTitle.textContent = getPageTitle(meta, session.view);
  if (session.user.role === "applicant") renderApplicantView();
  if (session.user.role === "officer") renderOfficerView();
  if (session.user.role === "admin") renderAdminView();
}

function getPageTitle(meta, view) {
  const item = meta.nav.find(([key]) => key === view);
  return item ? item[1] : meta.title;
}

  if (session.view === "downloads") return renderApplicantDownloads(person);
  if (session.view === "profile") return renderApplicantProfile(person);
  renderApplicantHome(person);
}

  event.preventDefault();
  const form = new FormData(event.target);
  const requestType = form.get("requestType");
  const appointmentDate = form.get("appointmentDate");
  const specialReason = String(form.get("specialReason") || "").trim();
  if (requestType === "ปกติ" && dateDiffDays(new Date(), new Date(`${appointmentDate}T00:00:00`)) < 7) {
    showNotice("การขอเอกสารแบบปกติต้องยื่นล่วงหน้าอย่างน้อย 7 วัน กรุณาเลือกวันที่รับเอกสารใหม่ หรือเลือกประเภทการขอเป็นกรณีพิเศษพร้อมระบุเหตุผลความจำเป็น", "warning");
    return;
  }
  if (requestType === "กรณีพิเศษ" && !specialReason) {
    showNotice("กรณีพิเศษต้องระบุเหตุผลความจำเป็นเพื่อให้เจ้าหน้าที่พิจารณา", "warning");
    return;
  }

  const person = getPerson(session.user.personId);
  person.phone = String(form.get("phone") || "").trim();
  person.email = String(form.get("email") || "").trim();
  person.note = String(form.get("applicantNote") || "").trim();

  const request = {
    requestId: `r${Date.now()}`,
    requestCode: nextRequestCode(),
    personId: person.personId,
    documentType: form.get("documentType"),
    requestType,
    purpose: String(form.get("purpose") || "").trim(),
    specialReason,
    submittedAt: toInputDate(new Date()),
    appointmentDate,
    deliveryMethod: form.get("deliveryMethod"),
    status: "รอเจ้าหน้าที่ตรวจสอบ",
    applicantNote: person.note,
    officerNote: "",
    assignedOfficerId: "",
    approvedAt: "",
    deliveredAt: "",
    fileName: "",
    certifiedStatus: false,
    certifiedBy: "",
    certifiedAt: "",
    googleSyncStatus: "รอส่งข้อมูล",
    googleSyncAt: "",
    googleSheetId: GOOGLE_CONFIG.sheetId,
    googleDriveFolderId: GOOGLE_CONFIG.driveFolderId
  };

  state.requests.unshift(request);
  saveState();
  logAction("submit_request", `ยื่นคำขอ ${request.requestCode}`);
  const syncResult = await syncRequestToGoogle(request, person, "create_request");
  request.googleSyncStatus = syncResult.ok ? "ส่งข้อมูลไป Google Sheet แล้ว" : "บันทึกในระบบแล้ว รอส่ง Google Sheet";
  request.googleSyncAt = syncResult.ok ? new Date().toISOString() : "";
  saveState();
  session.view = "history";
  renderShell();
  renderView();
  const syncText = syncResult.ok ? " และส่งข้อมูลไปยัง Google Sheet แล้ว" : " แต่ยังส่งข้อมูลไปยัง Google Sheet ไม่สำเร็จ ระบบบันทึกคำขอไว้ให้แล้ว";
  showNotice(`ระบบได้รับคำขอของท่านเรียบร้อยแล้ว เลขคำขอ ${request.requestCode}${syncText}`, syncResult.ok ? "success" : "warning");
}

async function syncRequestToGoogle(request, person, action) {
  const payload = buildGooglePayload(request, person, action);

  if (window.google?.script?.run) {
    return new Promise((resolve) => {
      window.google.script.run
        .withSuccessHandler((result) => resolve({ ok: Boolean(result?.ok), result }))
        .withFailureHandler((error) => {
          console.warn("Apps Script sync failed", error);
          resolve({ ok: false });
        })
        .saveRequest(payload);
    });
  }

  const form = new FormData();
  Object.entries(payload).forEach(([key, value]) => {
    form.append(key, value == null ? "" : String(value));
  });
  form.append("payload", JSON.stringify(payload));

  try {
    await fetch(GOOGLE_CONFIG.scriptUrl, {
      method: "POST",
      mode: "no-cors",
      body: form
    });
    return { ok: true };
  } catch (error) {
    console.warn("Google sync failed", error);
    return { ok: false };
  }
}

function savePersonnel(event) {
  event.preventDefault();
  const form = new FormData(event.target);
  const personId = form.get("personId") || `p${Date.now()}`;
  const existing = state.personnel.find((item) => item.personId === personId);
  const parsedBirthDate = parseBirthDateInput(form.get("birthDate"));
  if (!parsedBirthDate) {
    showNotice("กรุณากรอกวันเดือนปีเกิดรูปแบบ 07/11/2520", "warning");
    return;
  }
  const payload = {
    personId,
    prefix: form.get("prefix") || "",
    fullName: form.get("fullName") || "",
    position: form.get("position") || "",
    academicRank: form.get("academicRank") || "-",
    schoolName: form.get("schoolName") || "",
    positionNumber: form.get("positionNumber") || "-",
    directPaymentNumber: form.get("directPaymentNumber") || "-",
    nationalId: form.get("nationalId") || "",
    birthDate: parsedBirthDate,
    phone: form.get("phone") || "",
    email: form.get("email") || "",
    workStatus: existing?.workStatus || "ปฏิบัติงานอยู่",
    note: existing?.note || ""
  };
  if (existing) Object.assign(existing, payload);
  else state.personnel.push(payload);
  saveState();
  logAction("save_personnel", `บันทึกข้อมูลบุคลากร ${payload.fullName}`);
  renderAdminPersonnel();
  showNotice("บันทึกข้อมูลบุคลากรเรียบร้อยแล้ว", "success");
}

function handleContentClick(event) {
  const goView = event.target.closest("[data-go-view]");
  if (goView) {
    const select = event.target.closest("[data-select-request]");
    if (select) session.selectedRequestId = select.dataset.selectRequest;
    session.view = goView.dataset.goView;
    renderShell();
    renderView();
    return;
  }

  const selectRequest = event.target.closest("[data-select-request]");
  if (selectRequest) {
    session.selectedRequestId = selectRequest.dataset.selectRequest;
    renderView();
    return;
  }

  const quickStatus = event.target.closest("[data-quick-status]");
  if (quickStatus) {
    const form = document.querySelector("#officerActionForm");
    const request = state.requests.find((item) => item.requestId === form.dataset.requestId);
    request.status = quickStatus.dataset.quickStatus;
    if (request.status === "รับคำขอแล้ว") request.approvedAt = toInputDate(new Date());
    request.assignedOfficerId = session.user.userId;
    saveState();
    logAction("update_status", `เปลี่ยนสถานะ ${request.requestCode} เป็น${request.status}`);
    renderView();
    showNotice("อัปเดตสถานะคำขอเรียบร้อยแล้ว", "success");
    return;
  }

  const certify = event.target.closest("[data-certify]");
  if (certify) {
    certifyRequest(certify.dataset.certify);
    return;
  }

  const deliver = event.target.closest("[data-deliver]");
  if (deliver) {
    deliverRequest(deliver.dataset.deliver);
    return;
  }

  const download = event.target.closest("[data-download]");
  if (download) {
    const request = state.requests.find((item) => item.requestId === download.dataset.download);
    showNotice(`ต้นแบบพร้อมดาวน์โหลดไฟล์ ${request.fileName || "PDF"} ของคำขอ ${request.requestCode} แล้ว`, "success");
    return;
  }

  const exportButton = event.target.closest("[data-export]");
  if (exportButton) {
    showNotice(`ต้นแบบจำลองการส่งออกรายงานเป็น ${exportButton.dataset.export.toUpperCase()} เรียบร้อยแล้ว`, "success");
    return;
  }

  const editPerson = event.target.closest("[data-edit-person]");
  if (editPerson) {
    fillPersonnelForm(editPerson.dataset.editPerson);
    return;
  }

  const deletePerson = event.target.closest("[data-delete-person]");
  if (deletePerson) {
    const person = getPerson(deletePerson.dataset.deletePerson);
    if (person && person.personId !== session.user.personId) {
      state.personnel = state.personnel.filter((item) => item.personId !== person.personId);
      saveState();
      logAction("delete_personnel", `ลบข้อมูลบุคลากร ${person.fullName}`);
      renderAdminPersonnel();
      showNotice("ลบข้อมูลบุคลากรเรียบร้อยแล้ว", "success");
    } else {
      showNotice("ไม่สามารถลบบัญชีที่กำลังใช้งานอยู่ในต้นแบบนี้", "warning");
    }
  }
}

function handleContentChange(event) {
  if (event.target.id === "requestType") {
    const isSpecial = event.target.value === "กรณีพิเศษ";
    const wrap = document.querySelector("#specialReasonWrap");
    wrap.classList.toggle("hidden", !isSpecial);
    const dateInput = document.querySelector("[name='appointmentDate']");
    dateInput.min = isSpecial ? toInputDate(new Date()) : toInputDate(addDays(new Date(), 7));
    return;
  }

  if (["requestSearch", "statusFilter", "documentFilter", "typeFilter"].includes(event.target.id)) {
    refreshFilteredTable();
    return;
  }

  if (event.target.name === "pdfFile" && event.target.files?.length) {
    const fileNameInput = document.querySelector("[name='fileName']");
    fileNameInput.value = event.target.files[0].name;
    return;
  }

  if (event.target.matches("[data-import-personnel]")) {
    showNotice("ต้นแบบรับไฟล์นำเข้าแล้ว ในระบบจริงจะอ่าน Excel/CSV และตรวจสอบข้อมูลก่อนบันทึก", "success");
  }
}

function handleContentInput(event) {
  if (["requestSearch", "statusFilter", "documentFilter", "typeFilter"].includes(event.target.id)) {
    refreshFilteredTable();
  }
}

function refreshFilteredTable() {
  const activeContext = document.querySelector("[data-filter-context]")?.dataset.filterContext || "officer";
  const tablePanel = document.querySelector("[data-filter-context]")?.closest(".panel");
  const oldTable = tablePanel?.querySelector(".table-wrap, .muted");
  if (!oldTable) return;
  const replacement = document.createElement("div");
  replacement.innerHTML = renderRequestsTable(getFilteredRequests(), activeContext);
  oldTable.replaceWith(replacement.firstElementChild || replacement);
}

content.addEventListener("submit", async (event) => {
  if (event.target.id !== "officerActionForm") return;
  event.preventDefault();
  const request = state.requests.find((item) => item.requestId === event.target.dataset.requestId);
  const form = new FormData(event.target);
  request.status = form.get("status");
  request.appointmentDate = form.get("appointmentDate");
  request.fileName = String(form.get("fileName") || "").trim();
  request.officerNote = String(form.get("officerNote") || "").trim();
  request.assignedOfficerId = session.user.userId;
  if (request.status === "รับคำขอแล้ว" && !request.approvedAt) request.approvedAt = toInputDate(new Date());
  if (request.status === "จัดส่งเอกสารแล้ว" && !request.deliveredAt) request.deliveredAt = new Date().toISOString();
  saveState();
  logAction("update_request", `บันทึกการดำเนินงาน ${request.requestCode}`);
  const person = getPerson(request.personId);
  const syncResult = await syncRequestToGoogle(request, person, "update_request");
  request.googleSyncStatus = syncResult.ok ? "ส่งข้อมูลไป Google Sheet แล้ว" : "บันทึกในระบบแล้ว รอส่ง Google Sheet";
  request.googleSyncAt = syncResult.ok ? new Date().toISOString() : request.googleSyncAt;
  saveState();
  renderView();
  showNotice(syncResult.ok ? "บันทึกการดำเนินงานและส่งข้อมูลไป Google Sheet เรียบร้อยแล้ว" : "บันทึกการดำเนินงานแล้ว แต่ยังส่งข้อมูลไป Google Sheet ไม่สำเร็จ", syncResult.ok ? "success" : "warning");
});

function certifyRequest(requestId) {
  const request = state.requests.find((item) => item.requestId === requestId);
  const form = document.querySelector("#officerActionForm");
  const data = new FormData(form);
  request.fileName = String(data.get("fileName") || request.fileName || `${request.requestCode}.pdf`).trim();
  request.certifiedStatus = true;
  request.certifiedBy = String(data.get("certifiedBy") || getDefaultSignature().officerName).trim();
  request.certifiedAt = toInputDate(new Date());
  request.officerNote = String(data.get("officerNote") || request.officerNote || "รับรองสำเนาถูกต้องแล้ว").trim();
  request.assignedOfficerId = session.user.userId;
  saveState();
  logAction("certify_pdf", `รับรองสำเนาถูกต้อง ${request.requestCode}`);
  renderView();
  showNotice("รับรองสำเนาถูกต้องบน PDF เรียบร้อยแล้ว", "success");
}

async function deliverRequest(requestId) {
  const request = state.requests.find((item) => item.requestId === requestId);
  if (!request.fileName) {
    showNotice("กรุณาระบุหรืออัปโหลดชื่อไฟล์ PDF ก่อนจัดส่งเอกสาร", "warning");
    return;
  }
  request.status = "จัดส่งเอกสารแล้ว";
  request.deliveredAt = new Date().toISOString();
  request.assignedOfficerId = session.user.userId;
  if (!request.certifiedStatus) {
    request.certifiedStatus = true;
    request.certifiedBy = getDefaultSignature().officerName;
    request.certifiedAt = toInputDate(new Date());
  }
  saveState();
  logAction("deliver_pdf", `จัดส่งเอกสาร ${request.requestCode}`);
  const person = getPerson(request.personId);
  const syncResult = await syncRequestToGoogle(request, person, "deliver_request");
  request.googleSyncStatus = syncResult.ok ? "ส่งข้อมูลไป Google Sheet แล้ว" : "บันทึกในระบบแล้ว รอส่ง Google Sheet";
  request.googleSyncAt = syncResult.ok ? new Date().toISOString() : request.googleSyncAt;
  saveState();
  renderView();
  showNotice(syncResult.ok ? "จัดส่งเอกสารและส่งข้อมูลไป Google Sheet เรียบร้อยแล้ว" : "จัดส่งเอกสารแล้ว แต่ยังส่งข้อมูลไป Google Sheet ไม่สำเร็จ", syncResult.ok ? "success" : "warning");
}

function fillPersonnelForm(personId) {
  const person = getPerson(personId);
  const form = document.querySelector("#personnelForm");
  if (!person || !form) return;
  Object.entries(person).forEach(([key, value]) => {
    if (form.elements[key]) form.elements[key].value = value;
  });
  if (form.elements.birthDate) form.elements.birthDate.value = formatBirthPassword(person.birthDate);
  form.scrollIntoView({ behavior: "smooth", block: "start" });
}

function renderStatusBars() {
  const total = Math.max(state.requests.length, 1);
  return `
    <div class="report-bars">
      ${statuses.map((status) => {
        const count = state.requests.filter((item) => item.status === status).length;
        const width = Math.round((count / total) * 100);
        return `
          <div class="report-bar">
            <strong>${status}</strong>
            <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
            <span>${count}</span>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderSchoolBars() {
  const grouped = state.requests.reduce((acc, request) => {
    const school = getPerson(request.personId).schoolName;
    acc[school] = (acc[school] || 0) + 1;
    return acc;
  }, {});
  const max = Math.max(...Object.values(grouped), 1);
  return `
    <div class="report-bars">
      ${Object.entries(grouped).map(([school, count]) => `
        <div class="report-bar">
          <strong>${school}</strong>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round((count / max) * 100)}%"></div></div>
          <span>${count}</span>
        </div>
      `).join("")}
    </div>
  `;
}

function statCard(label, value, note) {
  return `
    <div class="stat-card">
      <span>${label}</span>
      <strong>${value}</strong>
      <small>${note}</small>
    </div>
  `;
}

function detail(label, value) {
  return `<div><dt>${label}</dt><dd>${escapeHtml(String(value || "-"))}</dd></div>`;
}

function statusBadge(status) {
  const className = status === "จัดส่งเอกสารแล้ว" ? "done" : status === "ยกเลิกคำขอ" ? "cancelled" : status === "รอเจ้าหน้าที่ตรวจสอบ" ? "waiting" : "";
  return `<span class="status-badge ${className}">${status}</span>`;
}

function getPerson(personId) {
  return state.personnel.find((item) => item.personId === personId);
}

function getRequestsForPerson(personId) {
  return state.requests.filter((request) => request.personId === personId);
}

function getDefaultSignature() {
  return state.signatures.find((item) => item.isDefault) || state.signatures[0] || {
    officerName: "เจ้าหน้าที่กลุ่มบริหารงานบุคคล",
    officerPosition: "เจ้าหน้าที่ผู้รับรอง"
  };
}

function nextRequestCode() {
  const buddhistYear = new Date().getFullYear() + 543;
  const code = `HR-${buddhistYear}-${String(state.serial).padStart(4, "0")}`;
  state.serial += 1;
  return code;
}

function maskNationalId(value) {
  if (!value || value.length < 8) return "-";
  return `${value.slice(0, 5)}xxxx${value.slice(-4)}`;
}

function formatThaiDate(value) {
  if (!value) return "-";
  const normalized = normalizeStoredDate(value);
  const date = new Date(`${normalized}T00:00:00`);
  if (Number.isNaN(date.getTime())) return value;
  return new Intl.DateTimeFormat("th-TH", { year: "numeric", month: "short", day: "numeric" }).format(date);
}

function formatBirthPassword(value) {
  const normalized = normalizeStoredDate(value);
  const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(normalized || "");
  if (!match) return value || "-";
  const year = Number(match[1]) + 543;
  return `${match[3]}/${match[2]}/${year}`;
}

function normalizePasswordDate(value) {
  const parsed = parseBirthDateInput(value);
  return parsed ? formatBirthPassword(parsed) : String(value || "").trim();
}

function parseBirthDateInput(value) {
  const text = String(value || "").trim();
  let match = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(text);
  if (match) {
    const day = Number(match[1]);
    const month = Number(match[2]);
    const year = Number(match[3]) > 2400 ? Number(match[3]) - 543 : Number(match[3]);
    return validDateParts(year, month, day) ? `${year}-${pad2(month)}-${pad2(day)}` : "";
  }
  match = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(text);
  if (match) {
    const year = Number(match[1]) > 2400 ? Number(match[1]) - 543 : Number(match[1]);
    const month = Number(match[2]);
    const day = Number(match[3]);
    return validDateParts(year, month, day) ? `${year}-${pad2(month)}-${pad2(day)}` : "";
  }
  return "";
}

function normalizeStoredDate(value) {
  return parseBirthDateInput(value) || String(value || "");
}

function validDateParts(year, month, day) {
  const date = new Date(year, month - 1, day);
  return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
}

function pad2(value) {
  return String(value).padStart(2, "0");
}

function formatThaiDateTime(value) {
  if (!value) return "-";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return new Intl.DateTimeFormat("th-TH", { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }).format(date);
}

function addDays(date, days) {
  const result = new Date(date);
  result.setDate(result.getDate() + days);
  return result;
}

function toInputDate(date) {
  const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 10);
}

function dateDiffDays(a, b) {
  const start = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const end = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((end - start) / 86400000);
}

function showNotice(message, type = "success") {
  noticeArea.innerHTML = `<div class="notice ${type}">${message}</div>`;
  window.clearTimeout(showNotice.timer);
  showNotice.timer = window.setTimeout(() => {
    noticeArea.innerHTML = "";
  }, 5200);
}

function logAction(action, detail) {
  if (!session.user) return;
  state.activityLogs.push({
    logId: `l${Date.now()}`,
    userId: session.user.userId,
    action,
    detail,
    createdAt: new Date().toISOString()
  });
  saveState();
}

function escapeHtml(value) {
  return value
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

</script>
